services:
  db:
    image: postgres:16
    container_name: sustainability-impact-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: impact_user
      POSTGRES_PASSWORD: impact_password
      POSTGRES_DB: impact_logger
    ports:
      - "5432:5432"
    volumes:
      - impact_db_data:/var/lib/postgresql/data

volumes:
  impact_db_data: